<!DOCTYPE html>
<html>
<head>
    <title>Validation Example</title>
</head>
<body>

    <h2>Number Validation</h2>


    <input type="text" id="inputBox" placeholder="Enter numbers only">
    <br><br>

    <button onclick="checkWithoutRegex()">Check Without Regex</button>
    <button onclick="checkWithRegex()">Check With Regex</button>

    <p id="result"></p>

    <script>
        const input = document.getElementById("inputBox");
        const result = document.getElementById("result");

        //  WITHOUT REGEX
        function checkWithoutRegex() {
            let value = input.value;
            let isValid = true;

            for (let i = 0; i < value.length; i++) {
                if (value[i] < '0' || value[i] > '9') {
                    isValid = false;
                    break;
                }
            }

            if (isValid && value !== "") {
                result.textContent = "Valid Number (Without Regex)";
                result.style.color = "green";
            } else {
                result.textContent = " Invalid Input (Without Regex)";
                result.style.color = "red";
            }
        }

        // WITH REGEX
        function checkWithRegex() {
            let value = input.value;

            let regex = /^\d+$/;

            if (regex.test(value)) {
                result.textContent = " Valid Number (With Regex)";
                result.style.color = "green";
            } else {
                result.textContent = " Invalid Input (With Regex)";
                result.style.color = "red";
            }
        }
    </script>

</body>
</html>
